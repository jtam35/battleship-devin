<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Battleship</h1>
    <p id="status">Place your ships!</p>
  </header>

  <main id="game-container">
    <!-- Placement phase -->
    <section id="placement-phase">
      <p id="placement-instructions">
        Click (or tap) a cell to preview your ship. Use <strong>Rotate</strong> or press <kbd>R</kbd> to change orientation, then confirm placement.
      </p>
      <div id="placement-board-wrapper">
        <h2>Your Board</h2>
        <div id="placement-grid" class="grid"></div>
      </div>
      <aside id="ship-list">
        <h2>Fleet</h2>
        <ul id="ships-to-place"></ul>
        <div id="placement-controls">
          <button id="rotate-btn" class="btn">Rotate (R)</button>
          <button id="place-btn" class="btn btn-primary" disabled>Place Ship</button>
        </div>
        <div id="difficulty-wrapper">
          <label for="difficulty-select">Difficulty</label>
          <select id="difficulty-select">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard" selected>Hard</option>
          </select>
        </div>
        <button id="start-btn" class="btn btn-primary" disabled>Start Game</button>
      </aside>
      <div id="placement-action-bar" class="hidden">
        <button id="mobile-rotate-btn" class="btn">Rotate Ship</button>
        <button id="mobile-place-btn" class="btn btn-primary">Place Ship Here</button>
      </div>
    </section>

    <!-- Game phase -->
    <section id="game-phase" class="hidden">
      <div id="last-result" class="hidden"></div>
      <div class="game-controls">
        <label class="toggle-label" title="Heatmap shows where the AI thinks your ships are — warm = likely target, cool = ruled out. Ship cells show a colored inset ring.">
          <input type="checkbox" id="heatmap-toggle" />
          <span>Show AI Thinking</span>
        </label>
        <button id="restart-game-btn" class="btn">Restart Game</button>
      </div>
      <div class="board-wrapper">
        <h2>Enemy Waters</h2>
        <div id="ai-grid" class="grid"></div>
      </div>
      <div class="board-wrapper">
        <h2>Your Board</h2>
        <div id="player-grid" class="grid"></div>
      </div>
      <div id="board-legend">
        <span class="legend-item"><span class="legend-swatch"></span>Untried</span>
        <span class="legend-item"><span class="legend-swatch ship"></span>Your Ship</span>
        <span class="legend-item"><span class="legend-swatch hit">✕</span>Hit</span>
        <span class="legend-item"><span class="legend-swatch sunk">✕</span>Sunk</span>
        <span class="legend-item"><span class="legend-swatch miss">•</span>Miss</span>
      </div>
      <div id="message-log">
        <h3>Battle Log</h3>
        <ul id="log-list"></ul>
      </div>
    </section>

    <!-- End screen overlay -->
    <div id="end-screen" class="hidden">
      <div id="end-box">
        <h2 id="end-title"></h2>
        <p id="end-message"></p>
        <div id="match-stats"></div>
        <button id="restart-btn" class="btn btn-primary">Play Again</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
